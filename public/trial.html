<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재판 진행 — 디스코드 모의법원</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="court-header">
  <div class="court-emblem">⚖️</div>
  <div class="court-title">디스코드 모의법원</div>
  <div class="court-subtitle">DISCORD MOCK COURT OF JUSTICE</div>
  <div class="header-divider"><span></span><i>✦</i><span></span></div>
</header>

<nav class="court-nav">
  <a href="index.html">🏛️ 사건 목록</a>
  <a href="verdicts.html">📜 판결 아카이브</a>
  <a href="#" class="active">⚖️ 재판 진행</a>
</nav>

<div class="container">
  <div id="loading" class="empty-state">
    <div class="empty-icon">⏳</div>
    <p>사건 정보를 불러오는 중...</p>
  </div>

  <div id="trialContent" style="display:none">

    <!-- 판결 배너 (종결 시) -->
    <div id="verdictBanner" style="display:none" class="verdict-banner">
      <div id="verdictStamp" class="verdict-stamp"></div>
      <div class="verdict-label">🔨 주 문 (主文)</div>
      <div id="verdictJoomun" class="verdict-joomun"></div>
      <div id="verdictResult" class="verdict-result"></div>
      <div id="verdictPunishment" class="verdict-punishment" style="display:none"></div>
      <div class="verdict-reason-box">
        <div class="verdict-reason-label">이 유 (理由)</div>
        <div id="verdictReasonText"></div>
      </div>
    </div>

    <!-- 사건 정보 -->
    <div id="trialInfoCard" class="trial-info-card">
      <div id="caseTypeLabel" class="case-type-label"></div>
      <div class="trial-case-number" id="caseNumber"></div>
      <div class="trial-case-title" id="caseTitle"></div>
      <div class="trial-parties">
        <div class="party-box">
          <div class="party-label" id="plaintiffLabel"></div>
          <div class="party-name" id="plaintiff"></div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="party-box">
          <div class="party-label" id="defendantLabel"></div>
          <div class="party-name" id="defendant"></div>
        </div>
      </div>
      <div class="trial-desc" id="caseDesc"></div>
    </div>

    <div class="trial-layout">

      <!-- 왼쪽: 발언 기록 -->
      <div>
        <div class="court-record">
          <div class="record-header" id="recordHeader">
            📜 법정 발언 기록
            <span id="stmtCount" style="margin-left:auto;font-size:11px;opacity:0.7;font-weight:400;letter-spacing:0;"></span>
          </div>
          <div id="statementsList" class="statements-list"></div>

          <div class="statement-form" id="statementFormArea">
            <div class="statement-form-inner">
              <div class="form-group" style="margin-bottom:0">
                <label style="font-size:12px;">닉네임</label>
                <input type="text" id="stmtAuthor" placeholder="닉네임 입력" style="padding:8px 10px;font-size:13px;">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-size:12px;">역할</label>
                <select id="stmtRole" style="padding:8px 10px;font-size:13px;"></select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:10px;margin-top:10px;">
              <textarea id="stmtContent" placeholder="발언 내용 입력... (Enter 전송 / Shift+Enter 줄바꿈)" style="padding:8px 10px;font-size:13px;min-height:70px;width:100%;"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:10px;">
              <label style="font-size:12px;">첨부파일 (선택)</label>
              <input type="file" id="stmtFile" style="font-size:12px;width:100%;">
              <div id="stmtFilePreview" style="margin-top:6px;display:none;"></div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center;">
              <span style="font-size:11px;color:#aaa;">Enter 전송 · Shift+Enter 줄바꿈</span>
              <button class="btn btn-primary btn-sm" onclick="submitStatement()">📢 발언하기</button>
            </div>
          </div>
        </div>

        <!-- 판사 판결 패널 -->
        <div id="judgePanelWrap" class="judge-panel mt-16" style="display:none">
          <div class="judge-panel-header" id="judgePanelHeader">🔨 판사 — 최종 판결 선고</div>
          <div class="judge-panel-body">

            <div class="form-group">
              <label>판결 주문</label>
              <select id="verdictSelect" style="padding:8px 10px;font-size:14px;width:100%;" onchange="onVerdictChange()"></select>
            </div>

            <!-- 형량 입력 (형사 유죄 시) -->
            <div id="punishmentGroup" class="form-group" style="display:none">
              <label id="punishmentLabel">형량</label>
              <input type="text" id="punishmentInput" placeholder="예: 징역 1년, 벌금 100만원, 집행유예 2년">
            </div>

            <div class="form-group">
              <label>판결 이유</label>
              <textarea id="verdictReasonInput" placeholder="판결 이유를 작성해주세요..." style="min-height:80px;width:100%;padding:8px 10px;font-size:13px;border:1.5px solid #ede6d6;border-radius:4px;font-family:inherit;"></textarea>
            </div>
            <button class="btn btn-gold w-full" onclick="submitVerdict()" style="width:100%;justify-content:center;">🔨 판결 선고</button>
          </div>
        </div>
      </div>

      <!-- 오른쪽 사이드바 -->
      <div>

        <!-- 배심원 투표 -->
        <div class="sidebar-card">
          <div class="sidebar-card-header">🗳️ 배심원 평결 투표</div>
          <div class="sidebar-card-body">
            <div class="vote-counts">
              <div class="vote-count-box guilty">
                <div class="vote-count-label" id="guiltyLabel">유죄</div>
                <div class="vote-count-num guilty" id="guiltyCount">0</div>
              </div>
              <div class="vote-count-box notguilty">
                <div class="vote-count-label" id="notGuiltyLabel">무죄</div>
                <div class="vote-count-num notguilty" id="notGuiltyCount">0</div>
              </div>
            </div>
            <div class="vote-bar-wrap">
              <div class="vote-bar">
                <div class="vote-bar-guilty" id="guiltyBar" style="width:50%"></div>
                <div class="vote-bar-notguilty" id="notGuiltyBar" style="width:50%"></div>
              </div>
            </div>
            <div id="voteFormArea">
              <div class="vote-form">
                <input type="text" id="voterName" class="vote-name-input" placeholder="닉네임 입력">
                <div class="vote-buttons" id="voteButtons"></div>
              </div>
              <div id="voterList" style="margin-top:12px;"></div>
            </div>
          </div>
        </div>

        <!-- 증거 -->
        <div class="sidebar-card">
          <div class="sidebar-card-header">🗂️ 증거 목록</div>
          <div class="sidebar-card-body">
            <div id="evidenceList" class="evidence-list">
              <div style="text-align:center;color:#bbb;font-size:13px;padding:12px 0;">제출된 증거 없음</div>
            </div>
            <div id="evidenceFormArea" style="margin-top:14px;border-top:1px solid var(--ivory-dark);padding-top:14px;">
              <div class="form-group">
                <label style="font-size:12px;">제출자 닉네임</label>
                <input type="text" id="evidenceSubmitter" placeholder="닉네임" style="padding:7px 10px;font-size:13px;width:100%;">
              </div>
              <div class="form-group">
                <label style="font-size:12px;">증거 제목</label>
                <input type="text" id="evidenceTitle" placeholder="예: 스크린샷 001, 카카오톡 대화" style="padding:7px 10px;font-size:13px;width:100%;">
              </div>
              <div class="form-group" style="margin-bottom:10px;">
                <label style="font-size:12px;">증거 내용 / 설명</label>
                <textarea id="evidenceContent" placeholder="증거 내용 또는 설명... (파일 첨부 시 생략 가능)" style="padding:7px 10px;font-size:13px;min-height:60px;width:100%;border:1.5px solid #ede6d6;border-radius:4px;font-family:inherit;resize:vertical;"></textarea>
              </div>
              <div class="form-group" style="margin-bottom:10px;">
                <label style="font-size:12px;">첨부파일 (선택, 최대 50MB)</label>
                <input type="file" id="evidenceFile" style="font-size:12px;width:100%;">
                <div id="evidenceFilePreview" style="margin-top:6px;display:none;"></div>
              </div>
              <button class="btn btn-primary btn-sm" style="width:100%;justify-content:center;" onclick="submitEvidence()">📎 증거 제출</button>
            </div>
          </div>
        </div>

        <!-- 링크 공유 -->
        <div class="sidebar-card">
          <div class="sidebar-card-header">🔗 링크 공유</div>
          <div class="sidebar-card-body">
            <p style="font-size:12px;color:#888;margin-bottom:8px;">이 링크를 디스코드에 공유하세요</p>
            <div style="display:flex;gap:6px;">
              <input type="text" id="shareUrl" readonly style="flex:1;padding:7px 10px;font-size:12px;background:#f5f0e8;border:1px solid #ede6d6;border-radius:4px;font-family:monospace;">
              <button class="btn btn-gold btn-sm" onclick="copyLink()">복사</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const params = new URLSearchParams(location.search);
const CASE_ID = params.get('id');
let caseData = null;

if (!CASE_ID) location.href = 'index.html';
document.getElementById('shareUrl').value = location.href;

// ── 역할 설정 ────────────────────────────────────────────────
const ROLES = {
  형사: [
    { value: 'judge',      label: '⚖️ 판사' },
    { value: 'prosecutor', label: '⚡ 검사' },
    { value: 'plaintiff',  label: '🙋 고소인 / 피해자' },
    { value: 'defender',   label: '🛡️ 변호인' },
    { value: 'defendant',  label: '🧑 피고인' },
    { value: 'witness',    label: '👁️ 증인' },
    { value: 'juror',      label: '👥 배심원' },
  ],
  민사: [
    { value: 'judge',      label: '⚖️ 판사' },
    { value: 'plaintiff',  label: '📜 원고' },
    { value: 'defender',   label: '🛡️ 원고측 변호인' },
    { value: 'defendant',  label: '🧑 피고' },
    { value: 'witness',    label: '👁️ 증인' },
    { value: 'juror',      label: '👥 배심원' },
  ],
};

const ROLE_LABELS = {
  형사: { judge: '판사', prosecutor: '검사', plaintiff: '고소인', defender: '변호인', defendant: '피고인', witness: '증인', juror: '배심원' },
  민사: { judge: '판사', prosecutor: '검사', plaintiff: '원고',   defender: '변호인', defendant: '피고',   witness: '증인', juror: '배심원' },
};

// ── 판결 설정 ────────────────────────────────────────────────
const VERDICTS = {
  형사: [
    { value: '유죄',    label: '⚡ 유죄',    cls: 'guilty',    joomun: '피고인을 다음과 같이 처한다.', punishment: true },
    { value: '무죄',    label: '🛡️ 무죄',    cls: 'notguilty', joomun: '피고인은 무죄.' },
    { value: '공소기각', label: '📋 공소기각', cls: 'dismissed', joomun: '이 사건 공소를 기각한다.' },
    { value: '면소',    label: '✋ 면소',    cls: 'dismissed', joomun: '이 사건 공소에 대하여 면소를 선고한다.' },
    // 친고죄·반의사불벌죄에 한해 고소취하 또는 처벌불원으로 공소기각 가능
    { value: '고소취하(공소기각)', label: '🤝 고소취하 (공소기각)', cls: 'dismissed', joomun: '피해자의 고소취하로 이 사건 공소를 기각한다.' },
  ],
  민사: [
    { value: '청구인용',  label: '✅ 청구인용 (원고 승소)', cls: 'civil-win',   joomun: '원고의 청구를 인용한다.', punishment: true, punishmentLabel: '이행 내용', punishmentPlaceholder: '예: 피고는 원고에게 100만원을 지급하라' },
    { value: '일부인용',  label: '⚖️ 일부인용',          cls: 'civil-win',   joomun: '원고의 청구를 일부 인용한다.', punishment: true, punishmentLabel: '인용 내용', punishmentPlaceholder: '예: 피고는 원고에게 50만원을 지급하라' },
    { value: '청구기각',  label: '❌ 청구기각 (피고 승소)', cls: 'civil-loss',  joomun: '원고의 청구를 기각한다.' },
    { value: '조정성립',  label: '🤝 조정성립',           cls: 'settlement',  joomun: '당사자 간 조정이 성립되었다.', punishment: true, punishmentLabel: '조정 내용', punishmentPlaceholder: '예: 피고는 원고에게 30만원을 지급하고 서로 사과한다' },
    { value: '소취하',   label: '📋 소취하',             cls: 'dismissed',   joomun: '원고가 소를 취하하였다.' },
  ],
};

// ── 사건 번호 생성 ───────────────────────────────────────────
function caseNumber(c) {
  if (c.case_number) return c.case_number;
  const year = new Date(c.created_at).getFullYear();
  const seq = c.id.slice(0, 4).toUpperCase();
  const type = (c.case_type || '형사') === '형사' ? '형단' : '민단';
  return `${year} 디코${type} 제${seq}호`;
}

// ── 케이스 로드 ──────────────────────────────────────────────
async function loadCase() {
  const res = await fetch(`/api/cases/${CASE_ID}`);
  if (!res.ok) { toast('사건을 찾을 수 없습니다.', 'error'); return; }
  caseData = await res.json();
  renderCase(caseData);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('trialContent').style.display = 'block';
}

function renderCase(c) {
  const type = c.case_type || '형사';
  const isCriminal = type === '형사';

  document.title = `${c.title} — 디스코드 모의법원`;

  // 사건 정보 카드
  const infoCard = document.getElementById('trialInfoCard');
  infoCard.className = `trial-info-card ${isCriminal ? 'criminal' : 'civil'}`;
  document.getElementById('caseTypeLabel').className = `case-type-label ${isCriminal ? 'criminal' : 'civil'}`;
  document.getElementById('caseTypeLabel').textContent = isCriminal ? '⚡ 형사 사건' : '📜 민사 사건';
  document.getElementById('caseNumber').textContent = caseNumber(c);
  document.getElementById('caseTitle').textContent = c.title;
  document.getElementById('plaintiffLabel').textContent = isCriminal ? '고소인 / 검사' : '원고';
  document.getElementById('defendantLabel').textContent = isCriminal ? '피고인' : '피고';
  document.getElementById('plaintiff').textContent = c.plaintiff;
  document.getElementById('defendant').textContent = c.defendant;
  document.getElementById('caseDesc').textContent = c.description;

  // 발언 기록 헤더
  document.getElementById('recordHeader').className = `record-header ${isCriminal ? 'criminal' : 'civil'}`;

  // 역할 셀렉트
  const roleSelect = document.getElementById('stmtRole');
  roleSelect.innerHTML = ROLES[type].map(r => `<option value="${r.value}">${r.label}</option>`).join('');

  // 판결 셀렉트
  const verdictSelect = document.getElementById('verdictSelect');
  verdictSelect.innerHTML = VERDICTS[type].map(v => `<option value="${v.value}">${v.label}</option>`).join('');
  onVerdictChange();

  // 판사 패널 색상
  const judgePanel = document.getElementById('judgePanelWrap');
  judgePanel.className = `judge-panel mt-16 ${isCriminal ? 'criminal' : 'civil'}`;
  document.getElementById('judgePanelHeader').className = `judge-panel-header ${isCriminal ? 'criminal' : 'civil'}`;

  // 배심원 투표 레이블 & 버튼
  if (isCriminal) {
    document.getElementById('guiltyLabel').textContent = '유죄';
    document.getElementById('notGuiltyLabel').textContent = '무죄';
    document.getElementById('voteButtons').innerHTML = `
      <button class="btn btn-danger btn-sm" style="justify-content:center;" onclick="submitVote('유죄')">⚡ 유죄</button>
      <button class="btn btn-success btn-sm" style="justify-content:center;" onclick="submitVote('무죄')">🛡️ 무죄</button>`;
  } else {
    document.getElementById('guiltyLabel').textContent = '원고 승';
    document.getElementById('notGuiltyLabel').textContent = '피고 승';
    document.getElementById('voteButtons').innerHTML = `
      <button class="btn btn-primary btn-sm" style="justify-content:center;background:var(--civil);" onclick="submitVote('원고승')">📜 원고 승</button>
      <button class="btn btn-sm" style="justify-content:center;background:var(--civil-loss);color:white;border:none;" onclick="submitVote('피고승')">🧑 피고 승</button>`;
  }

  renderStatements(c.statements || []);
  renderEvidence(c.evidence || []);
  renderVotes(c.votes || []);

  if (c.status === 'closed') {
    showVerdictBanner(c);
    document.getElementById('statementFormArea').style.display = 'none';
    document.getElementById('evidenceFormArea').style.display = 'none';
    document.getElementById('voteFormArea').style.display = 'none';
    document.getElementById('judgePanelWrap').style.display = 'none';
  } else {
    document.getElementById('judgePanelWrap').style.display = 'block';
  }
}

function onVerdictChange() {
  const type = (caseData?.case_type) || '형사';
  const val = document.getElementById('verdictSelect').value;
  const info = VERDICTS[type]?.find(v => v.value === val);
  const pg = document.getElementById('punishmentGroup');
  if (info?.punishment) {
    pg.style.display = 'block';
    document.getElementById('punishmentLabel').textContent = info.punishmentLabel || '형량';
    document.getElementById('punishmentInput').placeholder = info.punishmentPlaceholder || '예: 징역 1년, 벌금 100만원';
  } else {
    pg.style.display = 'none';
  }
}

function showVerdictBanner(c) {
  const type = c.case_type || '형사';
  const verdictInfo = VERDICTS[type]?.find(v => v.value === c.verdict) || { cls: 'dismissed', joomun: '' };
  const banner = document.getElementById('verdictBanner');
  banner.className = `verdict-banner ${type === '형사' ? 'criminal' : 'civil'}`;
  banner.style.display = 'block';

  document.getElementById('verdictStamp').className = `verdict-stamp ${verdictInfo.cls}`;
  document.getElementById('verdictStamp').textContent = c.verdict;
  document.getElementById('verdictJoomun').textContent = verdictInfo.joomun;
  document.getElementById('verdictResult').className = `verdict-result ${verdictInfo.cls}`;
  document.getElementById('verdictResult').textContent = c.verdict;

  const punEl = document.getElementById('verdictPunishment');
  if (c.punishment) {
    punEl.style.display = 'block';
    punEl.textContent = c.punishment;
  } else {
    punEl.style.display = 'none';
  }
  document.getElementById('verdictReasonText').textContent = c.verdict_reason || '';
}

// ── 파일 렌더링 헬퍼 ─────────────────────────────────────────
function fileHtml(url, backupUrl) {
  if (!url && !backupUrl) return '';
  const primary = url || backupUrl;
  const fallback = url && backupUrl ? backupUrl : null;
  if (/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(primary) || (fallback && /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(fallback))) {
    const onerror = fallback ? `this.onerror=null;this.src='${fallback}';` : '';
    return `<a href="${primary}" target="_blank"><img src="${primary}" ${onerror ? `onerror="${onerror}"` : ''} style="max-width:100%;max-height:200px;margin-top:6px;border-radius:4px;display:block;cursor:zoom-in;"></a>`;
  }
  const name = decodeURIComponent(primary.split('/').pop());
  const fallbackLink = fallback ? ` <a href="${fallback}" target="_blank" style="font-size:11px;color:#aaa;">(백업)</a>` : '';
  return `<a href="${primary}" target="_blank" download style="display:inline-block;margin-top:6px;font-size:12px;color:var(--gold-dark);text-decoration:underline;">📎 ${escHtml(name)}</a>${fallbackLink}`;
}

// ── 발언 렌더링 ──────────────────────────────────────────────
function renderStatements(stmts) {
  const el = document.getElementById('statementsList');
  document.getElementById('stmtCount').textContent = `${stmts.length}건`;
  if (!stmts.length) {
    el.innerHTML = `<div class="empty-state" style="padding:32px 20px;"><div class="empty-icon" style="font-size:32px;">💬</div><p style="font-size:13px;">아직 발언이 없습니다</p></div>`;
    return;
  }
  const type = caseData?.case_type || '형사';
  el.innerHTML = stmts.map(s => {
    const time = new Date(s.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    const label = ROLE_LABELS[type]?.[s.role] || s.role;
    return `<div class="statement-item role-${s.role}">
      <div class="statement-meta">
        <span class="role-tag ${s.role}">${label}</span>
        <span class="statement-author">${escHtml(s.author)}</span>
        <span class="statement-time">${time}</span>
      </div>
      <div class="statement-content">${escHtml(s.content)}</div>
      ${fileHtml(s.file_url, s.file_backup_url)}
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── 증거 렌더링 ──────────────────────────────────────────────
function renderEvidence(evs) {
  const el = document.getElementById('evidenceList');
  if (!evs.length) {
    el.innerHTML = `<div style="text-align:center;color:#bbb;font-size:13px;padding:12px 0;">제출된 증거 없음</div>`;
    return;
  }
  el.innerHTML = evs.map((e, i) => `
    <div class="evidence-item">
      <div class="evidence-title">증거 ${i + 1}. ${escHtml(e.title)}</div>
      <div class="evidence-submitter">제출: ${escHtml(e.submitted_by)}</div>
      ${e.content ? `<div class="evidence-content">${escHtml(e.content)}</div>` : ''}
      ${fileHtml(e.file_url, e.file_backup_url)}
    </div>`).join('');
}

// ── 투표 렌더링 ──────────────────────────────────────────────
function renderVotes(votes) {
  const type = caseData?.case_type || '형사';
  const isCriminal = type === '형사';
  const label1 = isCriminal ? '유죄' : '원고승';
  const label2 = isCriminal ? '무죄' : '피고승';
  const side1 = votes.filter(v => v.vote === label1).length;
  const side2 = votes.filter(v => v.vote === label2).length;
  const total = votes.length || 1;
  document.getElementById('guiltyCount').textContent = side1;
  document.getElementById('notGuiltyCount').textContent = side2;
  document.getElementById('guiltyBar').style.width = (side1 / total * 100) + '%';
  document.getElementById('notGuiltyBar').style.width = (side2 / total * 100) + '%';

  const listEl = document.getElementById('voterList');
  if (votes.length) {
    listEl.innerHTML = `<div style="font-size:11px;color:#aaa;margin-bottom:6px;">투표 현황</div>` +
      votes.map(v => `<div style="font-size:12px;display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0ede8;">
        <span>${escHtml(v.voter)}</span>
        <span style="font-weight:700;">${escHtml(v.vote)}</span>
      </div>`).join('');
  }
}

// ── 파일 업로드 헬퍼 ─────────────────────────────────────────
async function uploadFile(fileInput) {
  if (!fileInput.files[0]) return { url: null, backup_url: null };
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  const res = await fetch('/api/upload', { method: 'POST', body: formData });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return { url: data.url, backup_url: data.backup_url };
}

// ── API 호출 ─────────────────────────────────────────────────
async function submitStatement() {
  const author = document.getElementById('stmtAuthor').value.trim();
  const role = document.getElementById('stmtRole').value;
  const content = document.getElementById('stmtContent').value.trim();
  if (!author || !content) { toast('닉네임과 발언 내용을 입력해주세요.', 'error'); return; }
  let file_url = null, file_backup_url = null;
  try {
    ({ url: file_url, backup_url: file_backup_url } = await uploadFile(document.getElementById('stmtFile')));
  } catch (e) { toast('파일 업로드 실패: ' + e.message, 'error'); return; }
  const res = await fetch(`/api/cases/${CASE_ID}/statements`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ author, role, content, file_url, file_backup_url })
  });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
  document.getElementById('stmtContent').value = '';
  document.getElementById('stmtFile').value = '';
  document.getElementById('stmtFilePreview').style.display = 'none';
}

async function submitEvidence() {
  const submitted_by = document.getElementById('evidenceSubmitter').value.trim();
  const title = document.getElementById('evidenceTitle').value.trim();
  const content = document.getElementById('evidenceContent').value.trim();
  const fileInput = document.getElementById('evidenceFile');
  if (!submitted_by || !title) { toast('제출자와 증거 제목을 입력해주세요.', 'error'); return; }
  if (!content && !fileInput.files[0]) { toast('내용 또는 파일을 첨부해주세요.', 'error'); return; }
  let file_url = null, file_backup_url = null;
  try {
    ({ url: file_url, backup_url: file_backup_url } = await uploadFile(fileInput));
  } catch (e) { toast('파일 업로드 실패: ' + e.message, 'error'); return; }
  const res = await fetch(`/api/cases/${CASE_ID}/evidence`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ submitted_by, title, content, file_url, file_backup_url })
  });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
  document.getElementById('evidenceTitle').value = '';
  document.getElementById('evidenceContent').value = '';
  document.getElementById('evidenceFile').value = '';
  document.getElementById('evidenceFilePreview').style.display = 'none';
  toast('증거가 제출되었습니다.', 'success');
}

async function submitVote(vote) {
  const voter = document.getElementById('voterName').value.trim();
  if (!voter) { toast('닉네임을 입력해주세요.', 'error'); return; }
  const res = await fetch(`/api/cases/${CASE_ID}/votes`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ voter, vote })
  });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
  toast(`${vote} 투표 완료!`, 'success');
  document.getElementById('voterName').value = '';
}

async function submitVerdict() {
  const verdict = document.getElementById('verdictSelect').value;
  const punishment = document.getElementById('punishmentInput').value.trim();
  const verdict_reason = document.getElementById('verdictReasonInput').value.trim();
  if (!verdict_reason) { toast('판결 이유를 입력해주세요.', 'error'); return; }
  if (!confirm(`"${verdict}" 판결을 선고하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const res = await fetch(`/api/cases/${CASE_ID}/verdict`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ verdict, punishment, verdict_reason })
  });
  const data = await res.json();
  if (data.error) { toast(data.error, 'error'); return; }
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => toast('링크가 복사되었습니다!', 'success'));
}

// ── 소켓 ─────────────────────────────────────────────────────
socket.emit('join_case', CASE_ID);
socket.on('new_statement', (stmt) => {
  caseData.statements = [...(caseData.statements || []), stmt];
  renderStatements(caseData.statements);
});
socket.on('new_evidence', (ev) => {
  caseData.evidence = [...(caseData.evidence || []), ev];
  renderEvidence(caseData.evidence);
  toast(`새 증거 제출: ${ev.title}`);
});
socket.on('vote_update', (votes) => {
  caseData.votes = votes;
  renderVotes(votes);
});
socket.on('verdict', (updated) => {
  Object.assign(caseData, updated);
  showVerdictBanner(updated);
  document.getElementById('statementFormArea').style.display = 'none';
  document.getElementById('evidenceFormArea').style.display = 'none';
  document.getElementById('voteFormArea').style.display = 'none';
  document.getElementById('judgePanelWrap').style.display = 'none';
  toast(`판결 선고: ${updated.verdict}`, 'success');
});

// Enter 전송
document.getElementById('stmtContent').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitStatement(); }
});

// 파일 선택 미리보기
function setupFilePreview(inputId, previewId) {
  document.getElementById(inputId).addEventListener('change', function () {
    const preview = document.getElementById(previewId);
    const file = this.files[0];
    if (!file) { preview.style.display = 'none'; preview.innerHTML = ''; return; }
    preview.style.display = 'block';
    if (file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${url}" style="max-width:100%;max-height:150px;border-radius:4px;border:1px solid #ede6d6;">`;
    } else {
      preview.innerHTML = `<span style="font-size:12px;color:#888;">📎 ${escHtml(file.name)} (${(file.size/1024).toFixed(1)}KB)</span>`;
    }
  });
}
setupFilePreview('stmtFile', 'stmtFilePreview');
setupFilePreview('evidenceFile', 'evidenceFilePreview');

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

loadCase();
</script>
